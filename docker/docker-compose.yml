# ========================================
# Smart Fashion AI — Docker Compose (Infra + Services)
# ========================================
# Chạy hạ tầng only:
#   docker compose -f docker/docker-compose.yml --env-file docker/.env up -d postgres redis rabbitmq
# Chạy tất cả:
#   docker compose -f docker/docker-compose.yml --env-file docker/.env up -d
# ========================================

name: smart-fashion

services:
  # ─────────────────────────────────────
  # PostgreSQL 16 + pgvector
  # ─────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: sf-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../scripts/db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - sf-network

  # ─────────────────────────────────────
  # Redis 7.x
  # ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sf-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy noeviction
      --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - sf-network

  # ─────────────────────────────────────
  # RabbitMQ 3.13 + Giao diện quản trị (Management UI)
  # ─────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: sf-rabbitmq
    restart: unless-stopped
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - sf-network

  # ─────────────────────────────────────
  # Backend — NestJS 11 (TypeScript)
  # ─────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: sf-backend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-4000}:4000"
    env_file:
      - ../backend/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_HOST: redis
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/${RABBITMQ_VHOST}
    volumes:
      - ../uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - sf-network

  # ─────────────────────────────────────
  # AI Service — FastAPI (Python 3.12)
  # ─────────────────────────────────────
  ai-service:
    build:
      context: ../ai-service
      dockerfile: Dockerfile
    container_name: sf-ai-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ../ai-service/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/${RABBITMQ_VHOST}
      BACKEND_API_URL: http://backend:4000/api/v1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - sf-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local

# ─────────────────────────────────────
# Network — Mạng riêng (Internal Network)
# ─────────────────────────────────────

networks:
  sf-network:
    driver: bridge
    name: sf-network
